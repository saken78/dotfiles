# ~/.config/hypr/input.conf

# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                      Input Configuration                    ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

input {
    # Mouse sensitivity: -1.0 to 1.0 (0 = no modification)
    sensitivity = 0
    
    # Acceleration profile: adaptive or flat
    accel_profile = flat
    
    # Force floating mode (0 = disable, 1 = cursor moves with mouse, 2 = cursor moves with focus)
    follow_mouse = 1
    
    float_switch_override_focus = 2
    
    # Natural scroll (touchpad)
    natural_scroll = false
    
    kb_layout = us
    kb_model = pc105
}

# RDR APOLLO61 Keyboard (VID: 320f, PID: 5055)
# Fix: Left Alt and Left Win are swapped in hardware, need to swap back
device {
    name = RDR APOLLO61 Keyboard
    kb_rules = evdev
    kb_layout = us
    kb_model = pc105
    kb_options = altwin:swap_lalt_lwin
}


