# ┃                    Windowrules Configuration                ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# Windows Rules https://wiki.hyprland.org/Configuring/Window-Rules/ #

# Float Necessary Windows
windowrule = match:float true, match:class ^(org.pulseaudio.pavucontrol)
windowrule = match:float true, match:title ^(Picture in picture)$
windowrule = match:float true, match:title ^(Save File)$
windowrule = match:float true, match:title ^(Open File)$
windowrule = match:float true, match:class ^(LibreWolf)$,match:title ^(Picture-in-Picture)$
windowrule = match:float true, match:class ^(blueman-manager)$
windowrule = match:float true, match:class ^(xdg-desktop-portal-gtk|xdg-desktop-portal-kde|xdg-desktop-portal-hyprland)(.*)$
windowrule = match:float true, match:class ^(polkit-gnome-authentication-agent-1|hyprpolkitagent|org.org.kde.polkit-kde-authentication-agent-1)(.*)$
windowrule = match:float true, match:class ^(CachyOSHello)$
windowrule = match:float true, match:class ^(zenity)$
windowrule = match:float true, match:title ^(Steam - Self Updater)$
# Increase the opacity
windowrule = opacity 0.92, match:class ^(thunar|nemo)$
windowrule = opacity 0.96, match:class ^(discord|armcord|webcord)$
windowrule = opacity 0.95, match:title ^(QQ|Telegram)$
windowrule = opacity 0.95, match:title ^(NetEase Cloud Music Gtk4)$
# General window rules
windowrule = match:float true, match:title ^(Picture-in-Picture)$
windowrule = size 960 540, match:title ^(Picture-in-Picture)$
windowrule = move 25%-, match:title ^(Picture-in-Picture)$
windowrule = match:float true, match:title ^(imv|mpv|danmufloat|termfloat|nemo|ncmpcpp)$
windowrule = move 25%-, match:title ^(imv|mpv|danmufloat|termfloat|nemo|ncmpcpp)$
windowrule = size 960 540, match:title ^(imv|mpv|danmufloat|termfloat|nemo|ncmpcpp)$
windowrule = match:pin true, match:title ^(danmufloat)$
windowrule = rounding 5, match:title ^(danmufloat|termfloat)$
windowrule = animation slide right, match:class ^(kitty|Alacritty)$
windowrule = no_blur true, match:class ^(org.mozilla.firefox)$
# Decorations related to floating windows on workspaces 1 to 10
# windowrule = border_size 2, match:float true, onworkspace:w[fv1-10]
# windowrule = border_color $cachylblue, match:float true, onworkspace:w[fv1-10]
# windowrule = rounding 8, match:float true, onworkspace:w[fv1-10]
# Decorations related to tiling windows on workspaces 1 to 10
# windowrule = border_size 3, match:float false, onworkspace:f[1-10]
# windowrule = rounding 4, match:float false, onworkspace:f[1-10]
# Windows Rules End #

# Workspaces Rules https://wiki.hyprland.org/Configuring/Workspace-Rules/ #
# workspace = 1, default:true, monitor:$priMon
# workspace = 6, default:true, monitor:$secMon
# Workspace selectors https://wiki.hyprland.org/Configuring/Workspace-Rules/#workspace-selectors
# workspace = r[1-5], monitor:$priMon
# workspace = r[6-10], monitor:$secMon
# workspace = special:scratchpad, on-created-empty:$applauncher
# no_gaps_when_only deprecated instead workspaces rules with selectors can do the same
# Smart gaps from 0.45.0 https://wiki.hyprland.org/Configuring/Workspace-Rules/#smart-gaps
# workspace = w[tv1-10], gapsout:5, gapsin:3
# workspace = f[1], gapsout:5, gapsin:3
# Workspaces Rules End #

