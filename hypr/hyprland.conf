# https://github.com/Axenide/Dotfiles

monitor = eDP-1, 1920x1200@60, 0x0, 1
# Source a file (multi-file configs)
source = ~/.config/hypr/source/environment.conf
# source = ~/.config/hypr/source/binds.conf
# source = ~/.config/hypr/source/autostart.conf
source = ~/.config/hypr/source/windowrules.conf
source = ~/.config/hypr/config/input.conf
source = ~/.config/hypr/source/appearance.conf
source = ~/.config/hypr/source/misc.conf
source = ~/.config/hypr/source/plugins.conf

source = ~/.config/hypr/config/keybinds.conf
source = ~/.config/hypr/config/monitor.conf

# ============================================ #
# autostart
# ============================================ #

exec-once = glance --config ~/.config/glance/config.yaml
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1 &
exec = pgrep -x "hypridle" > /dev/null || hypridle
exec-once = hyprpm reload
exec-once = hyprctl setcursor "Vimix-cursors" 32

# =========================================
# (ambxst original bin)
# exec-once = ambxst
# ========================================= 

# =========================================
# (my version)
exec-once = amb
# =========================================



# Set cursor theme hyprcursor
env = HYPRCURSOR_THEME,"Vimix-cursors"
# Atau set size
env = HYPRCURSOR_SIZE,32

# Qt configuration 
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_STYLE_OVERRIDE,kvantum
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1

# window 
layerrule = blur on, match:namespace ^!(quickshell)$
layerrule = ignore_alpha 0.2, match:namespace ^!(quickshell)$
